version: '3.9'

services:

  api:
    build: .
    container_name: legacy-quality-api
    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - /app/node_modules

    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/legacy_quality_db

    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: